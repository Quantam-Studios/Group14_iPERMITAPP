<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <style>
        body {
            font-family: Arial;
            background-color: #f5f5f5;
        }

        .container {
            width: 300px;
            margin: 100px auto;
            padding: 20px;
            background: white;
            border: 1px solid #ddd;
            border-radius: 8px;
            text-align: center;
        }

        input {
            width: 90%;
            padding: 8px;
            margin: 8px 0;
        }

        button {
            padding: 8px 16px;
            margin-top: 10px;
            cursor: pointer;
        }

        .toggle {
            margin-bottom: 10px;
            cursor: pointer;
            color: blue;
        }
    </style>

    <script>
        function showRegister() {
            document.getElementById("loginForm").style.display = "none";
            document.getElementById("registerForm").style.display = "block";
        }

        function showLogin() {
            document.getElementById("loginForm").style.display = "block";
            document.getElementById("registerForm").style.display = "none";
        }
    </script>
</head>

<body>

<div class="container">

    <h2>Account</h2>

	<p th:if="${param.error}" style="color:red;">Invalid login</p>
	<p th:if="${param.registered}" style="color:green;">Account created!</p>
	
    <!-- LOGIN FORM -->
    <div id="loginForm">
        <form method="post" action="/login">
            <input name="email" placeholder="Email" required />
            <input name="password" type="password" placeholder="Password" required />
            <button type="submit">Login</button>
        </form>

        <p class="toggle" onclick="showRegister()">Create an account</p>
    </div>

    <!-- REGISTER FORM -->
    <div id="registerForm" style="display:none;">
        <form method="post" action="/register">
            <input name="email" placeholder="Email" required />
            <input name="password" type="password" placeholder="Password" required />
            <button type="submit">Register</button>
        </form>

        <p class="toggle" onclick="showLogin()">Back to login</p>
    </div>

</div>

</body>
</html>
