<!DOCTYPE html>
<html>
<head>
    <title>RE Dashboard</title>

    <style>
        body {
            font-family: Arial;
            background-color: #f5f5f5;
        }

        .container {
            width: 400px;
            margin: 100px auto;
            padding: 20px;
            background: white;
            border: 1px solid #ddd;
            border-radius: 8px;
            text-align: center;
        }

        .card {
            display: block;
            padding: 12px;
            margin: 10px 0;
            background: #f0f0f0;
            border-radius: 6px;
            text-decoration: none;
            color: black;
        }

        .card:hover {
            background: #e0e0e0;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
        }

        .logout {
            color: red;
            text-decoration: none;
            font-size: 14px;
        }

        .account {
            font-size: 14px;
            color: blue;
            text-decoration: none;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="topbar">
        <a class="account" href="/re/account">My Account</a>
        <a class="logout" href="/logout">Logout</a>
    </div>

    <h2>RE Dashboard</h2>

    <a class="card" href="/re/submit">Submit Permit Request</a>
    <a class="card" href="/re/requests">View My Requests</a>

</div>

</body>
</html>
