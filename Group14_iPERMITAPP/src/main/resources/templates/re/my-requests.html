<!DOCTYPE html>
<html>
<head>
    <title>My Permit Requests</title>

    <style>
        body {
            font-family: Arial;
            background-color: #f5f5f5;
        }

        .container {
            width: 600px;
            margin: 80px auto;
            padding: 20px;
            background: white;
            border-radius: 8px;
            border: 1px solid #ddd;
        }

        h2 {
            text-align: center;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th, td {
            padding: 10px;
            text-align: center;
            border-bottom: 1px solid #ddd;
        }

        th {
            background-color: #f0f0f0;
        }

        button {
            padding: 6px 12px;
            cursor: pointer;
        }

        .paid {
            color: green;
            font-weight: bold;
        }

        .unpaid {
            color: red;
            font-weight: bold;
        }

        a.back {
            display: inline-block;
            margin-top: 15px;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>My Permit Requests</h2>

    <table>
        <tr>
            <th>Request #</th>
            <th>Status</th>
            <th>Fee</th>
            <th>Action</th>
        </tr>

        <tr th:each="req : ${requests}">
            <td th:text="${req.requestNo}"></td>

            <td>

                <!-- Review Status -->
                <span th:if="${statusMap[req.requestNo] == 'Being Reviewed'}"
                      class="unpaid">
                    UNDER REVIEW
                </span>

                <span th:if="${statusMap[req.requestNo] == 'Approved'}"
                      class="paid">
                    APPROVED
                </span>

                <span th:if="${statusMap[req.requestNo] == 'Rejected'}"
                      class="unpaid">
                    REJECTED
                </span>

                <br>

                <!-- Payment Status -->
                <span th:if="${paidMap[req.requestNo]}"
                      class="paid">
                    PAID
                </span>

                <span th:if="${!paidMap[req.requestNo]}"
                      class="unpaid">
                    UNPAID
                </span>

            </td>

            <td>$<span th:text="${req.permitFee}"></span></td>

            <td>
                <a th:if="${!paidMap[req.requestNo]}"
                   th:href="@{/re/pay(requestNo=${req.requestNo})}">
                    <button>Pay</button>
                </a>

                <span th:if="${paidMap[req.requestNo]}" class="paid">✔ Paid</span>
            </td>
        </tr>
    </table>

    <a href="/re/dashboard" class="back">← Back to Dashboard</a>

</div>

</body>
</html>
