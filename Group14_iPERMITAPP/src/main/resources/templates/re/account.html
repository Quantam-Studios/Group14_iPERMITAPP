<!DOCTYPE html>
<html>
<head>
    <title>Account</title>

    <style>
        body {
            font-family: Arial;
            background-color: #f5f5f5;
        }

        .container {
            width: 400px;
            margin: 100px auto;
            padding: 20px;
            background: white;
            border-radius: 8px;
            border: 1px solid #ddd;
        }

        input {
            width: 90%;
            padding: 8px;
            margin: 6px 0;
        }

        button {
            padding: 8px 14px;
            margin-top: 10px;
        }

        .danger {
            color: red;
            font-size: 12px;
        }
    </style>
</head>

<body>

<div class="container">
	<div style="display:flex; justify-content:space-between; margin-bottom:10px;">
	    <a href="/re/dashboard" style="text-decoration:none; color:blue;">
	        ← Dashboard
	    </a>

	    <a href="/logout" style="text-decoration:none; color:red;">
	        Logout
	    </a>
	</div>
	
    <h2>My Account</h2>
	
	<p th:if="${param.error != null and param.error[0] == 'password'}" style="color:red;">
	    Incorrect current password
	</p>

	<p th:if="${param.error != null and param.error[0] == 'email'}" style="color:red;">
	    Invalid email format
	</p>

	<p th:if="${param.error != null and param.error[0] == 'exists'}" style="color:red;">
	    Email already exists
	</p>

	<p th:if="${param.success}" style="color:green;">
	    Account updated successfully
	</p>

	<form method="post" action="/re/account/update">

	    <h3>Profile Info</h3>

		<input name="contactPersonName"
		       th:value="${user.contactPersonName}"
		       placeholder="Enter contact name" />

		<label style="font-size: 13px; font-weight: bold; display: block; text-align: left; margin-top: 10px;">
			   Organization Name <span style="color: #888; font-weight: normal;">(Cannot be edited)</span>
		</label>
		<input name="organizationName"
			   th:value="${user.organizationName}"
			   readonly
			   style="background-color: #eee; cursor: not-allowed;" />

		<input name="organizationAddress"
		       th:value="${user.organizationAddress}"
		       placeholder="Enter address" />

		<input name="email"
		       th:value="${user.email}"
		       placeholder="Enter email" />

	    <hr>
		
		<h3>Site Info</h3>
		<input name="siteAddress" 
		       th:value="${user.sites != null and !user.sites.isEmpty() ? user.sites[0].siteAddress : ''}"
		       placeholder="Enter site address" required />

		<input name="siteContactPerson" 
		       th:value="${user.sites != null and !user.sites.isEmpty() ? user.sites[0].siteContactPerson : ''}"
		       placeholder="Enter site contact person" required />

		<hr>

	    <h3>Change Password (optional)</h3>

	    <input name="currentPassword" type="password" placeholder="Current Password (only if changing)" />
	    <input name="newPassword" type="password" placeholder="New Password" />

	    <button type="submit">Save Changes</button>
	</form>

</div>

</body>
</html>
