<!DOCTYPE html>
<html>
<head>
    <title>EO Dashboard</title>

    <style>
        body {
            font-family: Arial;
            background-color: #f5f5f5;
        }

        .container {
            width: 500px;
            margin: 120px auto;
            padding: 25px;
            background: white;
            border-radius: 8px;
            border: 1px solid #ddd;
            text-align: center;
        }

        h1 {
            margin-bottom: 20px;
        }

        button {
            padding: 12px 20px;
            font-size: 16px;
            border: none;
            background-color: #f0f0f0;
            color: black;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background-color: #e0e0e0;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
        }

        a {
            text-decoration: none;
            font-size: 14px;
        }

        .logout {
            color: red;
        }

        .home {
            color: blue;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="top-bar">
        <a class="logout" href="/logout">Logout</a>
    </div>

    <h1>EO Dashboard</h1>

    <!-- Main action button -->
    <a href="/eo/permits">
        <button type="button">View Permits</button>
    </a>

</div>

</body>
</html>
