<!DOCTYPE html>
<html>
<head>
    <title>Review Permit</title>

    <style>
        body {
            font-family: Arial;
            background-color: #f5f5f5;
        }

        .container {
            width: 700px;
            margin: 60px auto;
            padding: 20px;
            background: white;
            border-radius: 8px;
            border: 1px solid #ddd;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        a {
            text-decoration: none;
        }

        .back {
            color: blue;
        }

        .logout {
            color: red;
        }

        .section {
            margin-bottom: 15px;
        }

        label {
            font-weight: bold;
        }

        textarea {
            width: 100%;
            height: 120px;
            padding: 10px;
            margin-top: 5px;
            resize: none;
        }

        .btn-group {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
        }

        .accept {
            background-color: #28a745;
            color: white;
            padding: 10px 18px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        .reject {
            background-color: #dc3545;
            color: white;
            padding: 10px 18px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        .accept:hover {
            background-color: #218838;
        }

        .reject:hover {
            background-color: #c82333;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="top-bar">
        <a class="back" href="/eo/permits">← Back to Permits</a>
        <a class="logout" href="/logout">Logout</a>
    </div>

    <h2>Permit Review</h2>

    <!-- PERMIT INFO -->
    <div class="section">
        <label>Permit ID:</label>
        <div th:text="${permit.requestNo}"></div>
    </div>

    <div class="section">
        <label>Organization:</label>
        <div th:text="${permit.re.organizationName}"></div>
    </div>

    <div class="section">
        <label>Activity Description:</label>
        <div th:text="${permit.activityDescription}"></div>
    </div>

    <div class="section">
        <label>Start Date:</label>
        <div th:text="${permit.activityStartDate}"></div>
    </div>

    <div class="section">
        <label>Fee:</label>
        <div th:text="${permit.permitFee}"></div>
    </div>
	
	<hr>
	<h3>Site Information</h3>

	<div class="section">
	    <label>Site Address:</label>
	    <div th:text="${permit.site?.siteAddress ?: 'No site selected'}"></div>
	</div>

	<div class="section">
	    <label>Site Contact:</label>
	    <div th:text="${permit.site?.siteContactPerson ?: 'N/A'}"></div>
	</div>

    <hr>

    <!-- ACTION FORM -->
    <form method="post" th:action="@{'/eo/permits/' + ${permit.requestNo} + '/decision'}">

        <div class="section">
            <label>Reason for Decision:</label>
            <textarea name="reason" placeholder="Enter reason for approval or rejection..."></textarea>
        </div>

        <div class="btn-group">
            <button type="submit" name="decision" value="APPROVE" class="accept">
                Accept
            </button>

            <button type="submit" name="decision" value="REJECT" class="reject">
                Reject
            </button>
        </div>

    </form>

</div>

</body>
</html>
